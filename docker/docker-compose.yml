# Brings up a 3-relay network with persistent identities, plus an
# on-demand client that runs *inside* the same Docker network so it
# can resolve relay1/relay2/relay3 by Docker's internal service-name
# DNS — this matters because container-to-container addressing and
# host-to-container addressing are NOT the same thing. A relay inside
# this network cannot reach another relay via "127.0.0.1:900X" (that
# just loops back to itself); it needs the Docker service name. See
# ../topology/local-docker.json, which uses those service names.
#
# Bring up the relay fabric:
#   cd docker && docker compose up -d
#
# Run the client against it (from anywhere, this launches its own
# short-lived container on the same network):
#   docker compose run --rm cli "your message" --topology /app/topology/local-docker.json
 
services:
  relay1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-1
    command: ["/app/config/relay1.toml"]
    volumes:
      - ./config/relay1.toml:/app/config/relay1.toml:ro
    ports:
      - "9001:9001"
      - "10001:10001"
    networks:
      - veil-net
    restart: unless-stopped
 
  relay2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-2
    command: ["/app/config/relay2.toml"]
    volumes:
      - ./config/relay2.toml:/app/config/relay2.toml:ro
    ports:
      - "9002:9001"
      - "10002:10001"
    networks:
      - veil-net
    restart: unless-stopped
 
  relay3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-3
    command: ["/app/config/relay3.toml"]
    volumes:
      - ./config/relay3.toml:/app/config/relay3.toml:ro
    ports:
      - "9003:9001"
      - "10003:10001"
    networks:
      - veil-net
    restart: unless-stopped
 
  # One-off client: does not start with `docker compose up`, only via
  # `docker compose run --rm cli ...` (the "tools" profile keeps it
  # out of the default startup set, since it's meant to exit after
  # sending, not run forever like the relays).
  cli:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cli
    volumes:
      - ../topology:/app/topology:ro
    networks:
      - veil-net
    profiles:
      - tools
 
networks:
  veil-net:
    driver: bridge
