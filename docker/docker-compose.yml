# Brings up a 3-relay local network for manual testing:
#   cd docker && docker compose up --build
#
# Note: veil-cli currently spins up its own in-process relays for its
# demo (see crates/veil-cli/src/main.rs) and does not yet load an
# external topology file, so it cannot route through these containers
# out of the box. This compose file proves the relays build, start,
# and are network-reachable — wiring a client to an external topology
# is tracked in ROADMAP.md.

services:
  relay1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-1
    command: ["/app/config/relay1.toml"]
    volumes:
      - ./config/relay1.toml:/app/config/relay1.toml:ro
    ports:
      - "9001:9001"
    networks:
      - veil-net
    restart: unless-stopped

  relay2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-2
    command: ["/app/config/relay2.toml"]
    volumes:
      - ./config/relay2.toml:/app/config/relay2.toml:ro
    ports:
      - "9002:9001"
    networks:
      - veil-net
    restart: unless-stopped

  relay3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-3
    command: ["/app/config/relay3.toml"]
    volumes:
      - ./config/relay3.toml:/app/config/relay3.toml:ro
    ports:
      - "9003:9001"
    networks:
      - veil-net
    restart: unless-stopped

networks:
  veil-net:
    driver: bridge
