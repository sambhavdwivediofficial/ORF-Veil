# Brings up a 3-relay network with persistent identities, reachable
# from the host — for real, not just as a running-but-idle demo:
#   cd docker && docker compose up --build
#
# Each relay publishes two ports: its main relay port (where circuits
# are routed through) and its mailbox pull-listener port (main port +
# 1000, matching veil-relay's convention — see
# crates/veil-relay/src/pull_listener.rs). A host-side client loads
# ../topology/local-docker.json (built from these same identities) and
# talks to these containers directly — see
# `cargo run -p veil-cli -- "message" --topology ../topology/local-docker.json`.
 
services:
  relay1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-1
    command: ["/app/config/relay1.toml"]
    volumes:
      - ./config/relay1.toml:/app/config/relay1.toml:ro
    ports:
      - "9001:9001"
      - "10001:10001"
    networks:
      - veil-net
    restart: unless-stopped
 
  relay2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-2
    command: ["/app/config/relay2.toml"]
    volumes:
      - ./config/relay2.toml:/app/config/relay2.toml:ro
    ports:
      - "9002:9001"
      - "10002:10001"
    networks:
      - veil-net
    restart: unless-stopped
 
  relay3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    container_name: veil-relay-3
    command: ["/app/config/relay3.toml"]
    volumes:
      - ./config/relay3.toml:/app/config/relay3.toml:ro
    ports:
      - "9003:9001"
      - "10003:10001"
    networks:
      - veil-net
    restart: unless-stopped
 
networks:
  veil-net:
    driver: bridge
